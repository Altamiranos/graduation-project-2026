apiVersion: apps/v1 # deployment fór fastAPI
kind: Deployment # for more info - `kubectl get pods` in the terminal 
metadata:
  name: fastapi-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      serviceAccountName: fastapi-app-sa
      automountServiceAccountToken: false
      containers:
        - name: fastapi
          image: localhost/fastapi-k3s:1.0 # this is the Dockerfile (image) that was created in podman.
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "k3s"
          livenessProbe:  # restarts pod if it becomes unresponsive
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5  # wait 5s before first check
            periodSeconds: 10       # check every 10s
          readinessProbe: # removes pod from service if not ready
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5  # wait 5s before first check
            periodSeconds: 10       # check every 10s
---
apiVersion: v1 # service for FastAPI, inserted here instead of having two different .yaml
kind: Service # for more info - `kubectl get svc` in the terminal
metadata:
  name: fastapi-service
spec:
  selector:
    app: fastapi
  ports:
    - port: 80
      targetPort: 8000
  type: NodePort